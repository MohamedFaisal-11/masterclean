[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "masterclean"
version = "0.1.0"
description = "Automated CSV cleaning toolkit"
authors = [
  {name = "Mohamed Faisal"}
]

dependencies = [
  "pandas",
  "numpy",
  "typer",
  "chardet",
  "pytest",
  "rich"
]
[project.scripts]
masterclean = "masterclean.cli:main"