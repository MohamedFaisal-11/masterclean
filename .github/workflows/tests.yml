name: MasterClean Tests

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:
          - 3.9
          - 3.10
          - 3.11

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

      - name: Set Up Python

        uses: actions/setup-python@v5

        with:

          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run Tests

        run: |

          pytest